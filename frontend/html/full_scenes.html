<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full scenes – Lights App</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav>
    <a href="../index.html">Home</a>
  </nav>
  <main>
    <section class="section">
      <h1>Full scenes</h1>
      <p class="placeholder-note">
        Pair a <a href="scenes.html">combined scene</a> (DMX + LedFx presets) with an optional
        <a href="ilda.html">ILDA scene</a>. Full scenes appear on the Active page and cycle on each beat.
      </p>

      <div class="card">
        <h2 id="full-scene-form-title">New full scene</h2>
        <form id="full-scene-form" class="preset-form">
          <div class="form-group">
            <label for="full-scene-name">Name</label>
            <input type="text" id="full-scene-name" placeholder="e.g. Main show" required>
          </div>
          <div class="form-group">
            <label for="combined-scene">Combined scene</label>
            <select id="combined-scene" required aria-label="Combined scene">
              <option value="">— Select —</option>
            </select>
          </div>
          <div class="form-group">
            <label for="ilda-scene">ILDA scene (optional)</label>
            <select id="ilda-scene" aria-label="ILDA scene">
              <option value="">— None —</option>
            </select>
          </div>
          <div class="flex gap-md">
            <button type="submit" class="btn btn-primary">Save full scene</button>
            <button type="button" id="btn-cancel-edit" class="btn btn-secondary" style="display: none;">Cancel</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h2>Saved full scenes</h2>
        <p id="full-scenes-status" class="placeholder-note">Loading…</p>
        <div id="full-scene-list"></div>
      </div>

      <a href="../index.html" class="back-link">Back to home</a>
    </section>
  </main>
  <script src="../js/api.js"></script>
  <script src="../js/full_scenes.js"></script>
</body>
</html>
